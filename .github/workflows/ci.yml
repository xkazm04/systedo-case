name: CI

# Continuous integration. The main job runs `npm run check:ci` — the single
# command that reproduces this gate locally (check = typecheck && lint && build,
# then seed drift guard, unit suite, and the key-free LLM checks: chokepoint
# coverage + contract goldens). Keep ci.yml and the `check:ci` script pointing at
# each other so the two can never drift. Still NOT a full mirror of pre-commit:
# the real-model Claude run stays local-only (Husky, gated by a logged-in Claude
# CLI), while `next build` runs only here — so a green local commit can still
# fail CI on build unless you ran `npm run check:ci` yourself.
on:
  push:
  pull_request:

jobs:
  check:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # One command = the whole CI gate, runnable locally before pushing:
      #   check (typecheck && lint && build) → seed drift guard → unit tests →
      #   LLM chokepoint coverage → LLM contract goldens. All deterministic and
      #   key-free (the real-model Claude run stays local in the Husky hook).
      - name: Full CI gate (npm run check:ci)
        run: npm run check:ci

  # Key-free E2E smoke lane. Runs the Playwright suite with NO GEMINI_API_KEY:
  # the two keyed specs (ai-asistent, kampane-triage's model bits) skip their
  # live-model tests and keep structural + demo-mode + timeout coverage; the
  # other three specs (clanek-anchors, dashboard-comparison, design-system) are
  # fully key-free. This is the only layer that catches whole-page runtime
  # regressions (broken anchors, hydration errors, demo fallbacks) that tsc,
  # unit tests and next build all miss. The suite is serial (workers: 1) and one
  # spec deliberately waits out the 60 s client timeout — budget ~5-6 min.
  e2e-smoke:
    name: E2E smoke (Playwright, key-free)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite (model specs self-skip without a key)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
