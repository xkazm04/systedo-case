name: CI

# Continuous integration. NOTE: this is NOT a full mirror of the local pre-commit
# hook. CI runs `npm run check` (typecheck && lint && build), the unit suite, and
# the key-free LLM checks (chokepoint coverage + contract goldens). Two things run
# in only ONE place by design: `next build` and the contract goldens run only here
# (CI), while the real-model Claude run is local-only (Husky pre-commit, gated by a
# logged-in Claude CLI). A green local commit can therefore still fail CI on build.
on:
  push:
  pull_request:

jobs:
  check:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run check (typecheck && lint && build)
        run: npm run check

      - name: Unit tests
        run: npm run test:unit

      # Static LLM-wrapper gate: verifies every call site is tagged + test-registered
      # and that provider access stays confined to the chokepoint. Key-free and fast
      # (the real-model run stays local, gated by the Husky pre-commit hook).
      - name: LLM chokepoint coverage
        run: npm run test:llm:coverage

      # Contract goldens: every tool's (system + schema) fingerprint must match its
      # committed snapshot, so a prompt/schema change shows up as a reviewable diff
      # instead of silently passing. Deterministic and key-free (no model calls).
      - name: LLM contract goldens
        run: npm run llm:eval -- --strict
