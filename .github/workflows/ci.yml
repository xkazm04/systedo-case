name: CI

# Mirrors the local pre-commit gate: the same `npm run check`
# (typecheck && lint && build) that Husky/lint-staged enforce locally.
on:
  push:
  pull_request:

jobs:
  check:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run check (typecheck && lint && build)
        run: npm run check
