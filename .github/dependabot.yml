version: 2
updates:
  # App dependencies (Next.js, React, the AI SDK, tooling).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk dev/tooling bumps into one PR to cut noise.
      dev-dependencies:
        dependency-type: "development"
  # Keep the GitHub Actions in the CI workflow current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
